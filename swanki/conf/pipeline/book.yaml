# Card-density profile for full-length trade/textbook chapters (e.g. Ball,
# "How Life Works": ~882K chars + 89 figures across 11 chapters).
#
# Goal: keep the whole book under ~200 cards. Card count is
#   text:  ceil(chars / target_chars) * cards_per_segment
#   image: num_images * cards_per_image   (only if image_cards.enabled)
# (math-density boosting is ~0 for prose, so it doesn't apply here.)
#
# With the values below (figures ON, 1 card / figure, 1 text card / 10000 chars)
# the Ball book lands ~183 cards (94 text + 89 figure), 8-29 per chapter.
# Figure-dense chapters skew high (ch04: 20 figures, ch08: 16). The 89-figure
# count is the PDF's embedded-image count; MinerU may extract slightly fewer if
# it merges multi-panel figures, so figure cards are an upper bound.
#
# Dial total with target_chars (text only): 9000≈191, 11000≈175. To drop figure
# cards entirely set image_cards.enabled: false (then ~1 card/5500 chars ≈ 165).
#
# NOTE: pipeline configs are full group replacements — every key the pipeline
# reads must be present here (omitted keys fall back to hardcoded code defaults
# target_chars=2000 / cards_per_image=3 / enabled=True, NOT to default.yaml).
processing:
  segmentation: char
  context_radius: 2
  cards_per_segment: 1
  cloze_per_segment: 0
  blocking_audio: true
  confirm_before_generation: false
  char_segmentation:
    target_chars: 10000
  image_cards:
    enabled: true
    cards_per_image: 1
    image_on_front: true
    image_on_back: true
    require_math_content: false
    placement_strategy: prefer_front
    front_back_ratio: 0.5
