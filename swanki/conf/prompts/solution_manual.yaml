defaults:
  - default
  - _self_

prompts:
  solution_manual:
    section_classifier: |-
      You receive a sample of cleaned markdown from a textbook chapter PDF. Classify the document
      into a sequence of contiguous ContentSections with kind in {main_content, review_exercises,
      front_matter, back_matter}.

      - main_content: chapter body that teaches concepts. Even if it contains numbered Q&A
        ("1.1 What is X? Answer: ..."), it counts as main_content because it IS the chapter.
        For these sections, set overlap_density in [0,1] based on what fraction is problem-shaped.
      - review_exercises: end-of-chapter sections labeled Multiple Choice, Matching, True/False,
        Completion, Review Questions, Problems, Exercises, Practice — i.e., assessment material
        with paired or appended solutions. Set overlap_density=1.0.
      - front_matter: Copyright, Preface, Table of Contents, Dedication.
      - back_matter: Index, Glossary, Bibliography UNLESS the back-matter contains an
        "Answers to Review Questions" / "Solutions" block, in which case re-classify that span
        as review_exercises and set its paired_answer_section to the index of the corresponding
        question section (matched by chapter number).

      Cover every page. Do not invent sections. Set confidence appropriately.
    main_with_overlap_instruction: |-
      Note: this content includes numbered example questions or theory-problem Q&A blocks.
      Treat them as illustrative examples, NOT as content to memorize verbatim. Extract the
      underlying CONCEPTS, principles, definitions, and mechanisms being taught through the
      examples. Do NOT generate cards that restate the example questions. Generate
      concept-focused cards that a student would benefit from regardless of having seen the
      specific examples.
    problem_enumeration: |-
      You receive cleaned markdown from a textbook chapter (problems + solutions). List every
      numbered problem with its canonical book ID, subtype, and statement. Subtypes: theory_problem,
      multiple_choice, matching, true_false, completion. Preserve the book's numbering exactly
      (e.g. '1.7'). For Multiple-Choice items without book-level IDs, synthesize 'MC-{n}'.
      Do not invent problems. Do not skip problems. Do not generate solutions.
    problem_pairing: |-
      You receive a list of unpaired problems (each with id and a short statement excerpt)
      and the verbatim text of the document's solutions region. Some solution manuals (e.g.
      Bishop's "Deep Learning: Foundations and Concepts" worked-solutions PDF) number their
      worked solutions as bare `N.M` (e.g. `2.1 We first compute ...`) — NOT under an
      explicit `Solution N.M` heading. Your job is to match each unpaired problem to its
      worked solution in this region.

      For each match, emit ONE ProblemLocation with:
      - problem_id: the exact id from the supplied unpaired list (do NOT invent ids).
      - role: "solution".
      - text: the verbatim solution body — from the bare `N.M` label through (but not
        including) the next bare `N.M` label or end-of-region. Include sub-parts (a),
        (b), (c) when present.

      Match by CONTENT, not by position: the solution should derive or compute what the
      problem statement asks for. Ignore page running-headers like `Solutions 2.1–2.2`
      and chapter-title headers like `## Chapter 2 Probabilities` — they are not solutions.

      If you cannot find a solution for a problem in the supplied region, OMIT that
      problem from your output. Do NOT fabricate. The pipeline's coverage audit will
      surface the gap.
    problem_card_gen: |-
      You receive one problem (statement + solution, with cross-references already inlined) and a
      CardPlan describing exactly how many cards to emit. Generate exactly the cards specified
      with the requested card_subtype values in order.

      Each card must be self-contained: every referenced equation, theorem, or figure is already
      inlined in the statement/solution text — do NOT add bare references like "see equation (1.2)".
      Carry book-numbering as a label on the front ("Problem 1.7: ...") and as a tag (see required tags).
      Respect the 500-char limit on every back text.

      Formatting and rephrasing guidance (markdown is rendered in Anki):
      - Use **bold** SPARINGLY — only on the term(s) whose understanding the question is
        actually testing, plus the answer keyword(s) on the back. Bolding every technical
        term defeats the purpose: the learner stops noticing emphasis. List items, named
        entities incidental to the question, and contextual scaffolding should NOT be bold.
      - Use *italics* for genus/species names, foreign-language terms, and light emphasis.
      - You may lightly rephrase the source statement to improve clarity, fix ambiguity, or
        correct a minor source error — preserve the testable concept and the canonical answer.
        Do not change numerical values, equations, or domain-specific terminology.

      For full_solution cards (when requested), populate provenance_entries with one
      ProblemProvenance whose spans annotate the back text: each span has origin: copy
      (with source_ref) or origin: generated. Spans must concatenate (in order) to the
      back.text exactly.

      Set card_subtype on every emitted card to the requested value (problem_main, subproblem,
      problem_overview, or full_solution).
    card_plan_classifier: |-
      You receive one problem unit. Decide n_cards (1-5), which subproblem labels to expand,
      whether to include an overview card, and whether to include a full_solution card with
      gap-filling. Default to the heuristic in the prompt unless ambiguity is high.
    problem_card_gen_multiple_choice: |-
      You receive ONE multiple-choice problem with its stem and 2-5 lettered choices
      ((a)/(b)/(c)/(d), sometimes (e)). The Solution field carries the back-of-book correct
      letter, formatted as e.g. "(c)" or "(c) van Leeuwenhoek" if the option text is known.
      Generate exactly one problem_main card.

      Front — STRICT FORMAT. The visible label MUST be exactly "MC <n>:" where <n> is the
      item number (NOT the canonical ID like "MC-CH1-13"; the canonical ID is already on the
      card tags for source-tracing). The chapter is implicit in the citation key, so do NOT
      include it in the visible label.
      - Line 1: "MC <n>: <stem>"  (use **bold** SPARINGLY — only on the term(s) the stem is
        actually testing the learner on, typically the central noun phrase the question is
        about. Do NOT bold every named entity, every scientist's name, or every domain term.)
      - Lines 2..N: EACH lettered choice on its OWN line, exactly "(a) text", "(b) text", ...

      Example front (note the single space after "MC", lower-case (a)/(b), one choice per line):
      ```
      MC 13: Robert **Koch** is remembered in microbiology because he
      (a) proved the germ theory of disease
      (b) successfully cultivated viruses in the laboratory
      (c) developed a widely accepted classification scheme
      (d) devised the term "prokaryote"
      ```

      Back — STRICT FORMAT (note the period after the answer phrase, before the rationale):
      - "(letter) **<answer keyword(s)>** <remaining choice text if any>. <one-sentence
        justification grounded in the chapter content>."
      - If the solution gives only "(c)", expand to "(c) <full choice text>" by reading the
        matching choice from the stem. Always include the full choice text, not just the
        bare letter.
      - Total back text ≤500 chars.

      Example back:
      ```
      (a) **Robert Hooke**. Hooke used early microscopes in the 1660s to observe cells
      and microscopic structures, predating Pasteur and Lister.
      ```

      Light rephrasing for clarity is allowed (the source OCR sometimes drops words or has
      ambiguous phrasing); preserve the testable concept and the canonical answer.

      Required tags + canonical problem tag are listed in the user prompt; preserve all of
      them on the emitted card. Set card_subtype="problem_main" on the emitted card.
    problem_card_gen_matching: |-
      You receive ONE Matching item: a Column-A statement plus the full Column B option list
      (typically letters a-e). The Solution field carries the back-of-book correct option,
      formatted as e.g. "(c) Viruses" with the option text already resolved.

      The Column-A statement on its own is often too thin to make a good card front — for
      example "Rods, spheres, and spirals" is incomplete without the framing of "cell shapes"
      or "morphologies". From the chapter context (acronyms, technical terms, and the Column-B
      options themselves), infer the matching domain (e.g. "cell morphologies", "historical
      figures of microbiology", "macromolecule classes") and use it as a question prefix.

      Front — STRICT FORMAT. The visible label MUST be exactly "Matching <n>:" where <n> is
      the item number (NOT "MAT-CH1-3"; the canonical ID is on the card tags). The chapter
      is implicit in the citation key — do NOT include it in the visible label.

      Rewrite the Column-A statement as a DIRECT QUESTION that integrates the matching
      domain (the Column-B category type). Do NOT use a colon + em-dash construction like
      "Match the **X** to the **Y**:\n— <Column-A statement>". That two-step framing is
      awkward to read and adds nothing — the question form is always clearer.

      Format:
      - Line 1: "Matching <n>: <direct question that asks which Column-B option matches the
        Column-A statement>" — bold the domain noun (singular form of the Column-B category)
        and nothing else on this line.
      - Lines 2..N: EACH Column-B option on its OWN line, exactly "(a) Bacteria",
        "(b) Fungi", ...

      Example transformations:
      - Column-A "Performs photosynthesis", Column-B = microorganism groups
        -> "Matching 3: Which **microorganism group** performs photosynthesis?"
      - Column-A "Rods, spheres, and spirals", Column-B = organism types
        -> "Matching 6: Which **organism group** has rod, sphere, and spiral cell shapes?"
      - Column-A "Used in genetic engineering", Column-B = microorganism groups
        -> "Matching 10: Which **microorganism group** is used in genetic engineering?"

      Example full front:
      ```
      Matching 3: Which **microorganism group** performs photosynthesis?
      (a) Bacteria
      (b) Fungi
      (c) Viruses
      (d) Protozoa
      (e) Cyanobacteria
      ```

      Back — STRICT FORMAT (note the period after the answer phrase, before the rationale):
      - "(letter) **<full option text>**. <one-sentence rationale connecting the option to
        the Column-A property>."
      - Total back text ≤500 chars.

      Example back:
      ```
      (e) **Cyanobacteria**. Cyanobacteria are photosynthetic bacteria (formerly called
      blue-green algae) that carry out oxygenic photosynthesis.
      ```

      Light rephrasing of the Column-A prose for clarity is allowed; preserve the testable
      mapping. Set card_subtype="problem_main".
    problem_card_gen_true_false: |-
      You receive ONE True/False statement. The Solution field will be one of:
      "True." (statement is true as written),
      "False." (false but the source did not provide a replacement word), or
      "False — replace underlined word with: <word>" (the back-of-book correction word).

      The source OCR drops the underline markup that originally marked the swappable word, so
      the front of the card MUST NOT ask "what word replaces the originally underlined term?".
      Instead, the back identifies the swap by comparing the corrected word against the
      statement.

      Front — STRICT FORMAT. The visible label MUST be exactly "T/F <n>:" where <n> is the
      item number (NOT "TF-CH1-12"; the canonical ID is on the card tags). The chapter is
      implicit in the citation key — do NOT include it in the visible label. Do NOT add a
      redundant "**True or False:**" prefix in the body — the "T/F" label already conveys it.
      - Single line: "T/F <n>: <statement>" with **bold** applied CAREFULLY:
        * If the statement is FALSE and the back-of-book provides a corrected word, bold
          ONLY the word that would be swapped (e.g. given "Fungi, protozoa, and unicellular
          algae are classified together as **prokaryotes**" with the correction "eukaryotes",
          bold "prokaryotes" — NOT "Fungi" or the other list items).
        * If the statement is TRUE, bold the single concept the statement is testing
          knowledge of (typically the subject noun phrase).
        * Bolding more than 1-2 words almost always means too much — restraint is the rule.

      Example front (False statement, swap word bolded):
      ```
      T/F 6: Fungi, protozoa, and unicellular algae are classified together as **prokaryotes**.
      ```

      Example front (True statement, main testable concept bolded):
      ```
      T/F 12: **Microorganisms** form the foundations of many food chains in the world.
      ```

      Back: render as ONE of these forms:
        - "**True.**" plus an optional one-sentence justification.
        - "**False.** Replace *<old word from statement>* with **<corrected word>**." Identify
          the swap by comparing the back-of-book corrected word to the statement: the
          corrected word is the new value; the *<old word>* is the closest semantic match in
          the statement that the corrected word replaces (often a near-synonym or a
          category-confused term, e.g. "fungi" replaces "bacteria"). Add a one-sentence
          rationale.
      Total back text ≤500 chars.

      Light rephrasing of the statement for clarity is allowed; preserve the test of the
      learner's grasp of the correct vs. incorrect term. Set card_subtype="problem_main".
    problem_card_gen_completion: |-
      You receive ONE Completion item: a sentence with one blank (rendered as "____"). The
      Solution field carries the fill-in word or short phrase from the back-of-book.

      Front — STRICT FORMAT. The visible label MUST be exactly "Completion <n>:" where <n>
      is the item number (NOT "CMP-CH2-9"; the canonical ID is on the card tags). The
      chapter is implicit in the citation key — do NOT include it in the visible label. Do
      NOT add a redundant "**Fill in the blank:**" prefix in the body — the "Completion"
      label already conveys it.
      - Single line: "Completion <n>: <sentence with ____ intact>" with **bold** applied
        SPARINGLY — only on the context word(s) immediately adjacent to ____ that signal
        what kind of answer is expected. Do NOT bold every technical term in the sentence.

      Example front:
      ```
      Completion 7: The six-carbon sugar that cells most commonly use as an energy source is ____.
      ```

      Back — STRICT FORMAT (note the period after the answer phrase, before the rationale):
      - "**<answer phrase>**. <one-sentence rationale connecting the answer to the
        sentence's meaning>."
      - Total back text ≤500 chars.

      Example back:
      ```
      **glucose**. Glucose is the six-carbon sugar central to cellular respiration and the
      primary energy source for most cell types.
      ```

      Light rephrasing of the sentence for clarity is allowed; preserve the blank position
      and the canonical answer. Set card_subtype="problem_main".
