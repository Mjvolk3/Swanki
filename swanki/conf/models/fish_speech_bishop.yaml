models:
  llm:
    provider: openai
    model: gpt-5.5
    temperature: 0.7
    max_retries: 3
  tts:
    provider: fish_speech
    server_url: http://localhost:8080
    reference_id: bishop-20260612T1546-bayesian-bedrock
    reference_audio_path: /scratch/projects/torchcell-scratch/Swanki_Models/voice_refs/bishop/clips/20260612T1546-bayesian-bedrock/denoised.wav
    reference_text: "So you're led very naturally indeed uniquely into probability theory. And if you apply probability theory consistently that is the Bayesian framework. So for me the Bayesian framework is a very natural bedrock on which you can build and think about machine learning. Now, just as with theoretical physics you can't often just solve things exactly and certainly the Bayesian paradigm calls for integration or marginalization of all possible values of the parameters in your neural network."
    temperature: 0.8
    format: mp3
    # Mirror of fish_speech.yaml sub-tree shape; no per-chapter overrides yet.
    # Christopher Bishop voice for the "Deep Learning: Foundations and Concepts" book cards.
    preprocessor:
      pronunciations: {}
      strip_forbidden_tags: true
      acronym_letter_by_letter: true
      acronym_allowlist:
        [USA, UK, NASA, DNA, RNA, PCR, CPU, GPU, API, HTTP, JSON, HTML, XML,
         SQL, PDF, MP3, WAV, TTS, LLM, AI, ML, NLP,
         SGD, MLP, CNN, RNN, LSTM, GRU, KL, PCA, SVM, SVD, MAP, MLE, MCMC,
         ELBO, VAE, RL, GMM, EM, RBF, ROC, MSE, RMS]
    chunking:
      # Balanced chunker: hard cap 650, soft target 500, never-single-sentence.
      # See swanki.audio._common note 2026.06.06 for the Hamming sweep.
      max_chars: 650
      soft_max_chars: 500
      min_sentences_per_chunk: 2
      paragraph_priority: true
    postprocessor:
      gain_match_target_dbfs: -25.0
      chunk_pause_ms: 700
      chunk_pause_ms_by_boundary:
        paragraph: 1100
        sentence: 500
      chunk_tail_trim_ms: 250
      chunk_crossfade_ms: 50
      # Conservative per-chunk leading-edge fade (~1102 samples @ 44.1kHz). 0=off.
      chunk_onset_fade_ms: 25
      section_pause_ms: 5000
# OCR backend is its own Hydra group now (ocr=mineru | ocr=mathpix); see swanki/conf/ocr/.
