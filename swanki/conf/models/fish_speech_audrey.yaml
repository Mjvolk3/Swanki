    reference_text: "Causal inference asks \"What happens to X if we intervene on Y?\"—a fundamentally different question from predicting X from Y. Correlations can be spurious (confounded), but causal structure supports counterfactual reasoning, policy decisions, scientific explanation, and responsible ML (e.g., fairness). A widely used causal representation is the Bayesian network (BN): a directed acyclic graph (DAG) whose edges encode direct cause–effect links and whose structure implies a set of conditional independencies."
