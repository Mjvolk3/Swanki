models:
  llm:
    provider: openai
    model: gpt-5.4-2026-03-05
    temperature: 0.7
    max_retries: 3
  tts:
    provider: elevenlabs
    voice_id: onwK4e9ZLuTAKqWW03F9
    model: eleven_flash_v2_5
    lecture_model: eleven_multilingual_v2
    stability: 0.5
    similarity_boost: 0.5
  ocr:
    provider: mathpix          # mathpix | mineru
    # --- mineru-only knobs (ignored when provider=mathpix) ---
    python_bin: ~/opt/miniconda3/envs/swanki-mineru/bin/python
    runner: scripts/run_mineru_swanki.py
    cuda_visible_devices: "3"  # GPU freed from Fish (free-gpu-for-mineru.sh)
    # hf_home omitted on purpose: mineru.py resolves it lazily from
    # $SWANKI_DATA/models/mineru/hf_cache. Do NOT set ${oc.env:SWANKI_DATA}
    # here -- that would force SWANKI_DATA at compose time even on the mathpix
    # default path. Set hf_home explicitly only to override.
    device_mode: cuda
    backend: pipeline          # pipeline | vlm-auto-engine | hybrid-auto-engine
    lang: en
    method: auto               # auto | txt | ocr
    timeout: 3600
