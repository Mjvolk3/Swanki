refinement:
  enabled: true
  max_iterations: 3
  early_exit_on_quality: 0.9
  content_types:
  - regular
  - cloze
  - image
  include_audio: false
  feedback_prompts:
    regular_cards: "Check these regular cards for quality issues:\n1. External references ([1], \"According to X\", \"Figure\
      \ 3\")\n2. Vague context (\"this framework\", \"the model\")\n3. Generic tags (#equation vs #calculus.derivatives)\n\
      4. Author-centric questions (\"What is Smith's method?\")\n5. Undefined mathematical symbols\n6. Raw LaTeX commands\
      \ without $ delimiters (\\mathbf{A} should be $\\mathbf{A}$)\n7. Rote memorization questions\n8. Educational relevance\
      \ - does this help students learn KEY CONCEPTS?\n   - BAD: \"In the equation sin(2\u03C0x), what does \u03C0 represent?\"\
      \n   - GOOD: \"How does the Fourier transform decompose signals into frequency components?\"\n9. Focus on fundamentals,\
      \ not trivial notation details\n10. Answer revealed in question\n11. Excessive parenthetical phrases (should be minimal)\n\
      \    - BAD: \"The algorithm (which runs in O(n) time) processes data (from multiple sources)\"\n    - GOOD: \"The O(n)\
      \ algorithm processes data from multiple sources\"\n12. Choppy, terse writing that doesn't flow well\n    - BAD: \"\
      Neural networks learn patterns. They use backpropagation. This updates weights.\"\n    - GOOD: \"Neural networks learn\
      \ patterns through backpropagation, which updates the weights based on the error gradient.\"\n13. Poor readability for\
      \ audio generation\n    - Check: Would this sound natural when read aloud?\n    - Use connecting words and transitions\
      \ between concepts\n    - Ensure sentences flow logically from one to the next\n14. CRITICAL Length Validation:\n  \
      \  - Check if any card BACK text exceeds 500 characters (HARD LIMIT - will cause validation failure)\n    - Count actual\
      \ characters in the back/answer field\n    - If ANY card exceeds 500 chars, flag it as FAILING validation with the exact\
      \ character count\n    - Suggest shortening verbose answers to focus on key points only (aim for 200-400 chars)\n\n\
      If ALL cards meet quality standards AND are educationally valuable, set done=True.\nOtherwise list specific issues with\
      \ card numbers."
    cloze_cards: "Check these cloze cards for issues:\n1. CRITICAL: Cloze cards that ARE questions (end with \"?\")\n   -\
      \ BAD: \"How does X affect {{c1::Y}} in context Z?\"\n   - BAD: \"What is the impact of {{c1::30 excess deaths}}?\"\n\
      \   - GOOD: \"X affects Y in context Z by {{c1::specific mechanism}}\"\n   - GOOD: \"The term '30 excess deaths' means\
      \ {{c1::30 more deaths}} than expected\"\n2. CRITICAL: Cloze deletions that are TOO LONG (more than 5 words)\n   - BAD:\
      \ {{c1::techniques that add constraints or penalties to prevent overfitting}}\n   - BAD: {{c1::computing gradients by\
      \ applying the chain rule recursively}}\n   - GOOD: {{c1::L1 and L2 penalties}}\n   - GOOD: {{c1::chain rule}}\n3. NOT\
      \ focusing on key terms and critical concepts\n   - GOOD: Hiding key terms or critical values (1-5 words)\n   - BAD:\
      \ Hiding entire definitions or explanations\n4. Educational relevance - does this help students learn KEY CONCEPTS?\n\
      \   - Focus on fundamental principles, not trivial details\n   - Test understanding of important concepts from the document\n\
      5. Cloze cards with additional questions after the cloze deletion\n   - BAD: \"The algorithm is {{c1::O(n log n)}}.\
      \ Why is this important?\"\n   - GOOD: \"The algorithm has time complexity {{c1::O(n log n)}}\"\n6. More than 1 cloze\
      \ deletion per card (warning only)\n7. Math equations split across cloze markers\n8. Entire equations inside cloze when\
      \ only parts should be hidden\n9. Testing memorization instead of understanding\n10. Missing or generic tags, or duplicate\
      \ tag lines:\n    - ACCEPTABLE: Both \"- #tag1, #tag2\" and \"#tag1, #tag2\" formats\n    - Check for duplicate tag\
      \ lines (tags should appear ONCE at the end)\n    - Ensure tags are meaningful and specific, not generic\n11. CRITICAL:\
      \ Nested dollar signs in cloze deletions:\n    - BAD: {{c1::$equation$}} or {{c1::$2x + 1$}}\n    - GOOD: {{c1::equation}}\
      \ or $equation = {{c1::2x + 1}}$\n    - If math is already in $...$ context, don't add $ inside cloze\n12. CRITICAL:\
      \ Missing space before }} when LaTeX ends with }:\n    - BAD: {{c1::\\mathbf{B}^{\\mathrm{T}}}} (causes garbled rendering!)\n\
      \    - GOOD: {{c1::\\mathbf{B}^{\\mathrm{T}} }} (space before }})\n    - Check ANY LaTeX expression ending with } inside\
      \ cloze\n    - ALSO CHECK: No trailing spaces in LaTeX content itself\n    - BAD: {{c1::\\mathbf{b} }} (space after\
      \ b in LaTeX)\n    - GOOD: {{c1::\\mathbf{b}}} then apply fix \u2192 {{c1::\\mathbf{b} }}\n13. Malformed LaTeX/MathJax\
      \ within cloze deletions:\n    - Missing parentheses around expressions (e.g., \"1 - \\cos\" should be \"(1 - \\cos\"\
      )\n    - Extra closing braces in summations/fractions\n    - Unbalanced braces or parentheses\n    - CRITICAL: Incorrect\
      \ spaces in LaTeX commands\n      * BAD: {{c1::\\frac{\\mathrm{d}}{\\mathrm{d} x} }} (space between d and x)\n     \
      \ * GOOD: {{c1::\\frac{\\mathrm{d}}{\\mathrm{d}x} }} (no space in dx)\n      * BAD: \\mathrm{d} x (incorrect spacing)\n\
      \      * GOOD: \\mathrm{d}x (correct for differential)\n14. CRITICAL: Display math \\[...\\] inside cloze deletions\n\
      \    - BAD: \"\\[{{c1::equation}}\\]\" or \"{{c1::\\[equation\\]}}\" or \"{{c1::$equation$}}\"\n    - GOOD: \"$equation$\
      \ with {{c1::key part}}\" for inline math\n15. CRITICAL: Multiline cloze deletions (cloze split across lines)\n    -\
      \ Check if {{c1:: starts on one line but }} ends on another\n16. Complex LaTeX inside cloze - prefer simple expressions\n\
      \    - BAD: {{c1::complex multi-line equation}}\n    - GOOD: {{c1::Gaussian}} or {{c1::1/\\sqrt{2\\pi\\sigma^2}}}\n\n\
      Example of correct math cloze:\n\"The equation $E = {{c1::mc^2}}$ shows...\" (hide part of equation)\n\"The Gaussian\
      \ has normalization factor {{c1::1/\\sqrt{2\\pi\\sigma^2}}}\" (simple part)\n\"This represents {{c1::a conditional probability\
      \ distribution}}\" (conceptual)\n\n17. Back content length validation:\n    - Cloze card backs should be MINIMAL (ideally\
      \ empty, max 100 characters)\n    - If back content exceeds 100 characters, flag as an issue\n    - Front content (including\
      \ the full text with cloze) should stay under 500 chars total\n    - Count characters and report if exceeding limits\n\
      \nIf ALL cards are correct AND educationally valuable, set done=True."
    image_cards: |-
      Check these image-based cards:
      1. Questions that just ask to describe the image
      2. Image summaries that give away the answer
      3. Image markdown included in text
      4. Not testing understanding of concepts
      5. CRITICAL: Image cards should NEVER be cloze cards
         - BAD: "The diagram shows {{c1::three stages}} of development"
         - GOOD: "How many stages of development are shown in the diagram?"
         - Image cards must be Q&A format only

      Good questions test WHY/HOW, not just WHAT is shown.
      If ALL cards meet standards, set done=True.
    regular_card_audio: |-
      Check this REGULAR card audio transcript:
      1. Math notation must be converted to natural language
      2. Acronyms expanded on first use
      3. Citation key pronounced clearly at start
      4. Technical terms have pronunciation guides
      5. Both front and back should be readable

      If transcript is clear for audio, set done=True.
    cloze_card_audio: |-
      Check this CLOZE card audio transcript:

      FRONT audio must:
      1. Replace ALL {{c1::text}} with "blank"
      2. Citation key pronounced clearly at start
      3. Math outside cloze converted to natural language

      BACK audio must:
      1. Read the COMPLETE text including cloze content
      2. NO "blank" - reveal all hidden content
      3. Math notation converted to natural language

      If BOTH transcripts follow these rules, set done=True.
    image_card_audio: |-
      Check this IMAGE card audio transcript:
      1. Must include "Image description:" followed by full description
      2. Image description must be detailed (what type, layout, components)
      3. Math in image description converted to natural language
      4. Question/answer audio includes the image context
      5. Citation key pronounced clearly at start

      If image is well-described for audio-only learning, set done=True.
    summary_audio: |-
      Check this SUMMARY audio transcript:
      1. Professional, informative tone
      2. Citation key mentioned naturally early
      3. All acronyms expanded
      4. Math notation humanized
      5. Focus on key contributions and findings

      If summary is clear and professional, set done=True.
    reading_audio: |-
      Check this READING audio transcript:
      1. Full document narration
      2. All math notation converted to words
      3. Citation key mentioned at beginning
      4. Figure/table descriptions included
      5. Clear pronunciation of technical terms

      If reading is complete and clear, set done=True.
    lecture_audio: |-
      Check this LECTURE audio transcript:
      1. Educational presentation style
      2. Direct start without lengthy intro
      3. Citation key mentioned naturally
      4. Avoids theatrical language
      5. Math and technical terms clearly explained

      If lecture is educational and clear, set done=True.
  refinement_prompts:
    regular_cards: "Fix ALL the issues identified in the feedback.\nMaintain the same number of cards.\nEnsure every card\
      \ is self-contained.\nUse specific conceptual tags.\n- CRITICAL: Shorten any card backs exceeding 500 characters:\n\
      \  * Remove verbose explanations and redundant phrases\n  * Keep only essential information (aim for 200-400 characters)\n\
      \  * Split into multiple cards if a concept needs more comprehensive coverage\n  * Focus on clarity and conciseness\
      \ - cut unnecessary words\n  * Example: \"The algorithm works by first initializing variables, then iterating...\" \u2192\
      \ \"The algorithm initializes variables and iterates...\"\n"
    cloze_cards: "Fix ALL cloze card issues:\n- CRITICAL: Convert questions to statements:\n  * If card ends with '?', rewrite\
      \ as a statement\n  * \"How does X affect {{c1::Y}}?\" \u2192 \"X affects Y by {{c1::mechanism}}\"\n  * \"What is the\
      \ impact of {{c1::concept}}?\" \u2192 \"The impact of concept is {{c1::specific effect}}\"\n  * \"Why does {{c1::phenomenon}}\
      \ occur?\" \u2192 \"Phenomenon occurs because {{c1::reason}}\"\n- CRITICAL: Shorten cloze deletions to 1-5 words maximum:\n\
      \  * If more than 5 words, extract the KEY TERM only\n  * \"{{c1::techniques that prevent overfitting}}\" \u2192 \"\
      {{c1::regularization techniques}}\"\n  * \"{{c1::computing gradients using chain rule}}\" \u2192 \"{{c1::chain rule}}\"\
      \n- CRITICAL: Fix nested math delimiters in cloze:\n  * If line is already in math mode ($...$), don't add $ inside\
      \ cloze\n  * \"$$A = {{c1::$B$}}$$\" \u2192 \"$$A = {{c1::B}}$$\"\n  * \"$f(x) = {{c1::$2x$}}$\" \u2192 \"$f(x) = {{c1::2x}}$\"\
      \n- Reduce to max 1 cloze deletion (split cards if needed)\n- For equations: Hide PARTS, not the whole equation\n- Fix\
      \ LaTeX/MathJax formatting:\n  * CRITICAL: Add space before }} if LaTeX ends with }: {{c1::\\mathbf{A}^{-1}}} \u2192\
      \ {{c1::\\mathbf{A}^{-1} }}\n  * Remove trailing spaces in LaTeX: {{c1::\\mathbf{b} }} \u2192 {{c1::\\mathbf{b}}} \u2192\
      \ {{c1::\\mathbf{b} }}\n  * Fix incorrect spaces in LaTeX: \\mathrm{d} x \u2192 \\mathrm{d}x (no space in differential)\n\
      \  * Add missing parentheses: \"1 - \\cos\" \u2192 \"(1 - \\cos)\"\n  * Fix double closing braces: \"\\sum_{i=1}}^{m}}\"\
      \ \u2192 \"\\sum_{i=1}^{m}\"\n  * Ensure balanced braces and parentheses\n  * NEVER use display math \\[...\\] inside\
      \ cloze - convert to inline \\(...)\\)\n  * Join multiline cloze deletions into single lines\n- For complex equations,\
      \ hide key parts only:\n  * BAD: {{c1::entire complex equation}}\n  * GOOD: The equation $E = mc^2$ shows {{c1::mass-energy\
      \ equivalence}}\n- Keep cloze content simple - 1-5 words maximum\n- Ensure understanding-based questions\n- Add proper\
      \ hierarchical tags"
    image_cards: |-
      Improve image cards to:
      - Test conceptual understanding
      - Avoid revealing answers in summaries
      - Remove any image markdown
      - Focus on WHY/HOW questions
      - CRITICAL: Convert any cloze cards to Q&A format
        * Image cards must NEVER be cloze cards
        * Use "What/How/Why" questions instead
    regular_card_audio: |-
      Fix audio transcript for regular card:
      - Convert ALL math notation to natural language
      - Expand acronyms: "CNN" -> "Convolutional Neural Network (CNN)"
      - Add pronunciation: "Dijkstra (DIKE-stra)"
      - Ensure citation key is clear at start
    cloze_card_audio: "Fix CLOZE card audio transcripts:\nFRONT: Replace ALL cloze content with \"blank\"\n- {{c1::E = mc\xB2\
      }} -> \"The equation blank shows...\"\nBACK: Read COMPLETE text with cloze content revealed\n- \"The equation E equals\
      \ m c squared shows...\""
    image_card_audio: |-
      Fix IMAGE card audio transcript:
      - Add detailed image description at start
      - "Image description: This figure shows a flowchart with..."
      - Include all visual elements for audio-only learners
      - Convert any math in descriptions to words
    summary_audio: |-
      Refine summary audio:
      - Professional tone throughout
      - Natural citation key mention
      - Expand all acronyms
      - Focus on key findings
      - Ensure smooth transitions between sentences
      - Use flowing, natural language that sounds good when spoken
      - Avoid choppy, disconnected statements
    reading_audio: |-
      Refine reading audio:
      - Complete document narration
      - Describe all figures/tables
      - Convert all math to speakable form
      - Add section transitions
    lecture_audio: |-
      Refine lecture audio:
      - Educational, not theatrical
      - Direct start, concise end
      - Clear explanations
      - Natural flow with smooth transitions
      - Write complete, well-connected sentences
      - Avoid terse, choppy delivery
      - Use transitional phrases to connect ideas
      - Ensure content flows naturally when spoken aloud
